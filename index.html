<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma Investment Calculator</title>
    <style>
        :root { --alma-purple: #4b2c73; --alma-light-purple: #f9f6ff; --alma-text: #2c3e50; --alma-gray: #95a5a6; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f7f9; }
        .calc-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .logo-container { text-align: center; margin-bottom: 25px; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .company-logo { width: 240px; height: auto; }
        .img-container { background: #fff; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eee; height: 260px; display: flex; align-items: center; justify-content: center; }
        img#product-img { max-width: 90%; max-height: 90%; object-fit: contain; }
        label { display: block; margin: 18px 0 6px; font-weight: 600; color: var(--alma-text); font-size: 13px; text-transform: uppercase; }
        select, input[type="number"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #dce4ec; font-size: 16px; box-sizing: border-box; }
        input[type="range"] { width: 100%; margin-top: 10px; accent-color: var(--alma-purple); }
        .trade-in-btn { background: none; border: 1px solid var(--alma-purple); color: var(--alma-purple); padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; margin: 10px 0; }
        #trade-in-section, #harmony-options { display: none; margin: 10px 0; background: var(--alma-light-purple); padding: 15px; border-radius: 10px; border-left: 4px solid var(--alma-purple); }
        .applicator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .result-box { background: var(--alma-purple); color: white; padding: 25px; border-radius: 12px; text-align: center; margin-top: 25px; }
        .result-box h2 { margin: 8px 0 0; font-size: 38px; font-weight: 700; }
        .flex-row { display: flex; justify-content: space-between; margin-top: 8px; }
        small { color: var(--alma-gray); font-size: 11px; }
        #rate-display { color: var(--alma-purple); font-weight: bold; }
        .footer-text { font-size: 10px; color: var(--alma-gray); text-align: justify; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="calc-card">
    <div class="logo-container">
        <img src="https://anybodi.com.au/wp-content/uploads/bpxcftr-profile-uploads/741/image/Alma-Purple-Logo-01.png" class="company-logo" alt="Alma Lasers">
    </div>

    <div class="img-container">
        <img id="product-img" src="" alt="System Preview">
    </div>
    
    <label>Select Alma System</label>
    <select id="product-select" onchange="syncData()"></select>

    <div id="harmony-options">
        <label>Harmony Applicators</label>
        <div class="applicator-grid">
            <div><small>Laser (Qty)</small><input type="number" id="laser-count" value="0" min="0" oninput="updateText()"></div>
            <div><small>IPL/AFT (Qty)</small><input type="number" id="ipl-count" value="0" min="0" oninput="updateText()"></div>
        </div>
    </div>
    
    <button type="button" class="trade-in-btn" onclick="toggleTradeIn()">+ Add Trade-In Value</button>
    <div id="trade-in-section">
        <label>Trade-In Value ($ Excl. GST)</label>
        <input type="number" id="trade-val" placeholder="0" oninput="updateText()">
    </div>

    <label id="dep-label">Deposit Amount (Min 15%)</label>
    <input type="number" id="dep-num" oninput="updateSlider()">
    <input type="range" id="dep-slider" min="15" max="100" value="15" oninput="updateText()">
    <div class="flex-row">
        <small id="dep-perc-label">15% Deposit</small>
        <small id="rate-display">Annual Rate: --</small>
    </div>

    <label>Investment Term</label>
    <select id="term-select" onchange="calculateWeekly()">
        <option value="1">12 Months (52 Weeks)</option>
        <option value="2">24 Months (104 Weeks)</option>
        <option value="3">36 Months (156 Weeks)</option>
    </select>

    <div class="result-box">
        <span>Est. Weekly Investment (Excl. GST)</span>
        <h2 id="weekly-result">$0.00</h2>
    </div>
    
    <div class="footer-text">© 2026 Alma Lasers Australia. Figures are estimates based on annual interest rates. Subject to approval. All prices excl. GST.</div>
</div>

<script>
const googleSheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSFAcnJ9hhxYygF0kShdyAhVSkDEnesnjIClHRv-ltdf51sGoAw_MWYNTACsN-6VxqmlI_PcudjNDd-/pub?output=csv';

async function loadPrices() {
    try {
        const response = await fetch(googleSheetUrl + '&t=' + new Date().getTime());
        const csvData = await response.text();
        const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
        const select = document.getElementById('product-select');
        select.innerHTML = ''; 

        rows.forEach(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (cols.length >= 2) {
                const opt = document.createElement('option');
                const rawPrice = cols[1].replace(/[^0-9.]/g, '');
                opt.value = rawPrice;
                opt.text = cols[0].trim().replace(/"/g, '');
                opt.setAttribute('data-img', cols[2]?.trim() || '');
                opt.setAttribute('data-rate', parseFloat(cols[4]) || 0.05);
                
                // MATCHING YOUR SCREENSHOT: Col F (Index 5) and Col G (Index 6)
                opt.setAttribute('data-laser-p', parseFloat(cols[5]) || 0);
                opt.setAttribute('data-ipl-p', parseFloat(cols[6]) || 0);
                
                select.appendChild(opt);
            }
        });
        syncData();
    } catch (e) { console.error("Database failed to load", e); }
}

function syncData() {
    const sel = document.getElementById('product-select').selectedOptions[0];
    if (!sel) return;
    const text = sel.text.toLowerCase();
    
    // Shows options if "Harmony" is in the system name
    document.getElementById('harmony-options').style.display = text.includes('harmony') ? 'block' : 'none';
    
    const imgUrl = sel.getAttribute('data-img');
    document.getElementById('product-img').src = imgUrl && imgUrl.startsWith('http') ? imgUrl : "https://via.placeholder.com/400x260?text=Alma+System";
    
    document.getElementById('rate-display').innerText = "Annual Rate: " + (parseFloat(sel.getAttribute('data-rate'))*100).toFixed(1) + "%";
