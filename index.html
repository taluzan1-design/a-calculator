<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma Investment Calculator</title>
    <link rel="apple-touch-icon" href="https://anybodi.com.au/wp-content/uploads/bpxcftr-profile-uploads/741/image/Alma-Purple-Logo-01.png">
    <link rel="icon" type="image/png" href="https://www.almalasers.com/wp-content/themes/alma/assets/images/favicon.png">

    <style>
        :root { --alma-purple: #4b2c73; --alma-light-purple: #f9f6ff; --alma-text: #2c3e50; --alma-gray: #95a5a6; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f7f9; }
        .calc-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .logo-container { text-align: center; margin-bottom: 25px; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .company-logo { width: 240px; height: auto; }
        .img-container { background: #fff; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eee; height: 260px; display: flex; align-items: center; justify-content: center; }
        img#product-img { max-width: 90%; max-height: 90%; object-fit: contain; }
        label { display: block; margin: 18px 0 6px; font-weight: 600; color: var(--alma-text); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input[type="number"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #dce4ec; font-size: 16px; box-sizing: border-box; }
        input[type="range"] { width: 100%; margin-top: 10px; accent-color: var(--alma-purple); }
        
        .special-terms-grid { display: flex; gap: 5px; margin: 10px 0; }
        .term-btn { flex: 1; padding: 15px 5px; border: 1px solid #dce4ec; border-radius: 8px; background: white; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--alma-text); transition: 0.3s; text-align: center; }
        .term-btn.active { background: var(--alma-purple); color: white; border-color: var(--alma-purple); }

        .btn-group { display: flex; gap: 8px; margin: 10px 0; }
        .toggle-btn { background: none; border: 1px solid var(--alma-purple); color: var(--alma-purple); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; flex: 1; text-align: center; }

        /* Ensuring Subtotal starts as Display: None */
        #trade-in-section, #harmony-options, #subtotal-section { display: none; margin: 10px 0; background: var(--alma-light-purple); padding: 15px; border-radius: 10px; border-left: 4px solid var(--alma-purple); }
        
        .subtotal-box { text-align: center; padding: 10px 0; }
        .subtotal-box span { font-size: 10px; color: var(--alma-gray); text-transform: uppercase; font-weight: bold; display: block; }
        .subtotal-box h3 { margin: 8px 0 0; color: var(--alma-purple); font-size: 32px; font-weight: 700; }

        .applicator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .result-box { background: var(--alma-purple); color: white; padding: 25px; border-radius: 12px; text-align: center; margin-top: 25px; transition: 0.3s; opacity: 0.6; }
        .result-box.ready { opacity: 1; transform: scale(1.02); }
        .result-box h2 { margin: 8px 0 0; font-size: 38px; font-weight: 700; }
        .flex-row { display: flex; justify-content: space-between; margin-top: 8px; }
        small { color: var(--alma-gray); font-size: 11px; }
        #rate-display { color: var(--alma-purple); font-weight: bold; }
        .footer-text { font-size: 10px; color: var(--alma-gray); text-align: justify; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="calc-card">
    <div class="logo-container">
        <img src="https://anybodi.com.au/wp-content/uploads/bpxcftr-profile-uploads/741/image/Alma-Purple-Logo-01.png" class="company-logo">
    </div>

    <div class="img-container">
        <img id="product-img" src="" alt="System Preview">
    </div>
    
    <label>Select Alma System</label>
    <select id="product-select" onchange="syncData()">
        <option>Loading Systems...</option>
    </select>

    <div id="harmony-options">
        <label>Harmony Applicators</label>
        <div class="applicator-grid">
            <div><small>Laser (Qty)</small><input type="number" id="laser-count" value="0" min="0" oninput="masterCalc()"></div>
            <div><small>IPL/AFT (Qty)</small><input type="number" id="ipl-count" value="0" min="0" oninput="masterCalc()"></div>
        </div>
    </div>

    <label>Select Payment Term</label>
    <div class="special-terms-grid">
        <button type="button" class="term-btn" id="btn-12" onclick="setTerm(1, 0.30, 'btn-12')">12 Months</button>
        <button type="button" class="term-btn" id="btn-24" onclick="setTerm(2, 0.25, 'btn-24')">24 Months</button>
        <button type="button" class="term-btn" id="btn-36" onclick="setTerm(3, 0.20, 'btn-36')">36 Months</button>
    </div>

    <div class="btn-group">
        <button type="button" id="subtotal-btn" class="toggle-btn" onclick="toggleSection('subtotal-section', 'subtotal-btn', '+ Show Subtotal', '- Hide Subtotal')">+ Show Subtotal</button>
        <button type="button" id="trade-btn" class="toggle-btn" onclick="toggleSection('trade-in-section', 'trade-btn', '+ Add Trade-In', '- Remove Trade-In')">+ Add Trade-In</button>
    </div>

    <div id="subtotal-section">
        <div class="subtotal-box">
            <span id="sub-label">Subtotal (System & Applicators)</span>
            <h3 id="subtotal-display">$0</h3>
        </div>
    </div>
    
    <div id="trade-in-section">
        <label>Trade-In Value ($ Excl. GST)</label>
        <input type="number" id="trade-val" placeholder="0" oninput="masterCalc()">
    </div>

    <label>Deposit Amount (Min 15%)</label>
    <input type="number" id="dep-num" oninput="manualDeposit()">
    <input type="range" id="dep-slider" min="15" max="100" value="15" oninput="masterCalc()">
    <div class="flex-row">
        <small id="dep-perc-label">15% Deposit</small>
        <small id="rate-display">Annual Rate: --</small>
    </div>

    <div class="result-box" id="result-container">
        <span id="result-label">Select a payment term above</span>
        <h2 id="weekly-result">$0</h2>
    </div>
</div>

<script>
const googleSheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSFAcnJ9hhxYygF0kShdyAhVSkDEnesnjIClHRv-ltdf51sGoAw_MWYNTACsN-6VxqmlI_PcudjNDd-/pub?output=csv';
let currentDiscount = 0; let currentTerm = 0;

function parseCSVLine(text) {
    const result = []; let cell = ''; let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
        let char = text[i];
        if (char === '"') inQuotes = !inQuotes;
        else if (char === ',' && !inQuotes) { result.push(cell.trim()); cell = ''; }
        else cell += char;
    }
    result.push(cell.trim());
    return result;
}

async function loadPrices() {
    try {
        const response = await fetch(googleSheetUrl + '&t=' + new Date().getTime());
        const csvData = await response.text();
        const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
        const select = document.getElementById('product-select');
        select.innerHTML = ''; 

        rows.forEach(row => {
            const cols = parseCSVLine(row);
            if (cols.length >= 7) {
                const opt = document.createElement('option');
                opt.text = cols[0];
                opt.value = cols[1].replace(/[^0-9.]/g, '');
                opt.setAttribute('data-img', cols[2] || '');
                let rate = parseFloat(cols[4]);
                opt.setAttribute('data-rate', isNaN(rate) ? 0.05 : (rate > 1 ? rate/100 : rate));
                opt.setAttribute('data-laser-p', parseFloat(cols[5].replace(/[^0-9.]/g, '')) || 0);
                opt.setAttribute('data-ipl-p', parseFloat(cols[6].replace(/[^0-9.]/g, '')) || 0);
                select.appendChild(opt);
            }
        });
        syncData();
    } catch (e) { console.error(e); }
}

function syncData() {
    const sel = document.getElementById('product-select').selectedOptions[0];
    if (!sel) return;
    document.getElementById('harmony-options').style.display = sel.text.toLowerCase().includes('harmony') ? 'block' : 'none';
    document.getElementById('product-img').src = sel.getAttribute('data-img');
    document.getElementById('rate-display').innerText = "Annual Rate: " + (parseFloat(sel.getAttribute('data-rate')) * 100).toFixed(1) + "%";
    document.getElementById('laser-count').value = 0;
    document.getElementById('ipl-count').value = 0;
    masterCalc();
}

function setTerm(t, d, id) {
    const btn = document.getElementById(id);
    const active = btn.classList.contains('active');
    document.querySelectorAll('.term-btn').forEach(b => b.classList.remove('active'));
    if (!active) { btn.classList.add('active'); currentTerm = t; currentDiscount = d; }
    else { currentTerm = 0; currentDiscount = 0; }
    masterCalc();
}

function masterCalc() {
    const sel = document.getElementById('product-select').selectedOptions[0];
    if (!sel || sel.text.includes("Loading")) return;

    const base = parseFloat(sel.value) || 0;
    const lP = parseFloat(sel.getAttribute('data-laser-p')) || 0;
    const iP = parseFloat(sel.getAttribute('data-ipl-p')) || 0;
    const lQ = parseInt(document.getElementById('laser-count').value) || 0;
    const iQ = parseInt(document.getElementById('ipl-count').value) || 0;
    
    const totalRaw = base + (lP * lQ) + (iP * iQ);
    const subtotal = totalRaw * (1 - currentDiscount);

    document.getElementById('subtotal-display').innerText = "$" + Math.round(subtotal).toLocaleString();
    document.getElementById('sub-label').innerText = currentDiscount > 0 ? "Subtotal (After Discount)" : "Subtotal (System & Applicators)";

    const tradeIn = parseFloat(document.getElementById('trade-val').value) || 0;
    const adjustedTotal = Math.max(0, subtotal - tradeIn);
    
    const depPct = document.getElementById('dep-slider').value;
    document.getElementById('dep-perc-label').innerText = depPct + "% Deposit";
    const depAmt = Math.round(adjustedTotal * (depPct / 100));
    document.getElementById('dep-num').value = depAmt;

    const loan = Math.max(0, adjustedTotal - depAmt);
    const container = document.getElementById('result-container');
    const resultDisplay = document.getElementById('weekly-result');
    const label = document.getElementById('result-label');

    if (currentTerm === 0) {
        resultDisplay.innerText = "$0";
        label.innerText = "Select a payment term above";
        container.classList.remove('ready');
    } else {
        const rate = parseFloat(sel.getAttribute('data-rate')) / 52;
        const weeks = currentTerm * 52;
        let pmt = (rate === 0) ? (loan / weeks) : (loan * rate) / (1 - Math.pow(1 + rate, -weeks));
        resultDisplay.innerText = "$" + Math.round(pmt).toLocaleString();
        label.innerText = "Est. Weekly Investment (Excl. GST)";
        container.classList.add('ready');
    }
}

function manualDeposit() {
    masterCalc();
}

function toggleSection(id, btnId, s, h) {
    const sec = document.getElementById(id);
    const btn = document.getElementById(btnId);
    const isHidden = sec.style.display === 'none' || sec.style.display === '';
    sec.style.display = isHidden ? 'block' : 'none';
    btn.innerText = isHidden ? h : s;
}

window.onload = loadPrices;
</script>
</body>
</html>
