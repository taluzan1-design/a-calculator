<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma Investment Calculator</title>
    <link rel="apple-touch-icon" href="https://anybodi.com.au/wp-content/uploads/bpxcftr-profile-uploads/741/image/Alma-Purple-Logo-01.png">
    <link rel="icon" type="image/png" href="https://www.almalasers.com/wp-content/themes/alma/assets/images/favicon.png">

    <style>
        :root { --alma-purple: #4b2c73; --alma-light-purple: #f9f6ff; --alma-text: #2c3e50; --alma-gray: #95a5a6; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f7f9; }
        .calc-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .logo-container { text-align: center; margin-bottom: 25px; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .company-logo { width: 240px; height: auto; }
        .img-container { background: #fff; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #eee; height: 260px; display: flex; align-items: center; justify-content: center; }
        img#product-img { max-width: 90%; max-height: 90%; object-fit: contain; }
        label { display: block; margin: 18px 0 6px; font-weight: 600; color: var(--alma-text); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input[type="number"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #dce4ec; font-size: 16px; box-sizing: border-box; }
        input[type="range"] { width: 100%; margin-top: 10px; accent-color: var(--alma-purple); }
        
        .btn-group { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
        .toggle-btn { background: none; border: 1px solid var(--alma-purple); color: var(--alma-purple); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.3s; flex: 1; min-width: 130px; text-align: center; }
        .toggle-btn:hover { border-color: var(--alma-purple); background: var(--alma-light-purple); }
        
        .special-terms-grid { display: flex; gap: 5px; margin: 10px 0; }
        .term-btn { flex: 1; padding: 15px 5px; border: 1px solid #dce4ec; border-radius: 8px; background: white; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--alma-text); transition: 0.3s; text-align: center; }
        .term-btn.active { background: var(--alma-purple); color: white; border-color: var(--alma-purple); }

        #trade-in-section, #harmony-options, #subtotal-section { display: none; margin: 10px 0; background: var(--alma-light-purple); padding: 15px; border-radius: 10px; border-left: 4px solid var(--alma-purple); }
        
        .subtotal-box span { font-size: 10px; color: var(--alma-gray); text-transform: uppercase; font-weight: bold; }
        .subtotal-box h3 { margin: 5px 0 0; color: var(--alma-purple); font-size: 24px; font-weight: 700; }

        .applicator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .result-box { background: var(--alma-purple); color: white; padding: 25px; border-radius: 12px; text-align: center; margin-top: 25px; }
        .result-box h2 { margin: 8px 0 0; font-size: 38px; font-weight: 700; }
        .flex-row { display: flex; justify-content: space-between; margin-top: 8px; }
        small { color: var(--alma-gray); font-size: 11px; }
        #rate-display { color: var(--alma-purple); font-weight: bold; }
        .footer-text { font-size: 10px; color: var(--alma-gray); text-align: justify; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="calc-card">
    <div class="logo-container">
        <img src="https://anybodi.com.au/wp-content/uploads/bpxcftr-profile-uploads/741/image/Alma-Purple-Logo-01.png" class="company-logo" alt="Alma Lasers">
    </div>

    <div class="img-container">
        <img id="product-img" src="https://via.placeholder.com/400x260?text=Select+System" alt="System Preview">
    </div>
    
    <label>Select Alma System</label>
    <select id="product-select" onchange="syncData()">
        <option>Loading Systems...</option>
    </select>

    <div id="harmony-options">
        <label>Harmony Applicators</label>
        <div class="applicator-grid">
            <div><small>Laser (Qty)</small><input type="number" id="laser-count" value="0" min="0" oninput="updateText()"></div>
            <div><small>IPL/AFT (Qty)</small><input type="number" id="ipl-count" value="0" min="0" oninput="updateText()"></div>
        </div>
    </div>

    <label>Select Payment Term</label>
    <div class="special-terms-grid">
        <button type="button" class="term-btn" id="btn-12" onclick="setSpecialTerm(1, 0.30, 'btn-12')">12 Months</button>
        <button type="button" class="term-btn" id="btn-24" onclick="setSpecialTerm(2, 0.25, 'btn-24')">24 Months</button>
        <button type="button" class="term-btn" id="btn-36" onclick="setSpecialTerm(3, 0.20, 'btn-36')">36 Months</button>
    </div>

    <div class="btn-group">
        <button type="button" id="subtotal-btn" class="toggle-btn" onclick="toggleSubtotal()">+ Show Price Subtotal</button>
        <button type="button" id="trade-in-btn" class="toggle-btn" onclick="toggleTradeIn()">+ Add Trade-In Value</button>
    </div>

    <div id="subtotal-section">
        <div class="subtotal-box">
            <span>Subtotal (After Discount)</span>
            <h3 id="subtotal-display">$0</h3>
        </div>
    </div>
    
    <div id="trade-in-section">
        <label>Trade-In Value ($ Excl. GST)</label>
        <input type="number" id="trade-val" placeholder="0" oninput="updateText()">
    </div>

    <label>Deposit Amount (Min 15%)</label>
    <input type="number" id="dep-num" oninput="updateSlider()">
    <input type="range" id="dep-slider" min="15" max="100" value="15" oninput="updateText()">
    <div class="flex-row">
        <small id="dep-perc-label">15% Deposit</small>
        <small id="rate-display">Annual Rate: --</small>
    </div>

    <div class="result-box">
        <span>Est. Weekly Investment (Excl. GST)</span>
        <h2 id="weekly-result">$0</h2>
    </div>
    
    <div class="footer-text">
        © 2026 Alma Lasers Australia. Estimates only.
    </div>
</div>

<script>
const googleSheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSFAcnJ9hhxYygF0kShdyAhVSkDEnesnjIClHRv-ltdf51sGoAw_MWYNTACsN-6VxqmlI_PcudjNDd-/pub?output=csv';
let currentDiscount = 0;
let currentTerm = 1;

async function loadPrices() {
    try {
        const response = await fetch(googleSheetUrl + '&t=' + new Date().getTime());
        const csvData = await response.text();
        const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
        const select = document.getElementById('product-select');
        select.innerHTML = ''; 

        rows.forEach(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (cols.length >= 2) {
                const opt = document.createElement('option');
                opt.value = cols[1].replace(/[^0-9.]/g, '');
                opt.text = cols[0].trim().replace(/"/g, '');
                opt.setAttribute('data-img', cols[2]?.trim() || '');
                let rateVal = parseFloat(cols[4]);
                if (isNaN(rateVal)) rateVal = 0.05; 
                if (rateVal > 1) rateVal = rateVal / 100; 
                opt.setAttribute('data-rate', rateVal);
                opt.setAttribute('data-laser-p', parseFloat(cols[5]) || 0);
                opt.setAttribute('data-ipl-p', parseFloat(cols[6]) || 0);
                select.appendChild(opt);
            }
        });
        syncData();
    } catch (e) { console.error(e); }
}

function setSpecialTerm(termValue, discountValue, btnId) {
    const clickedBtn = document.getElementById(btnId);
    
    if (clickedBtn.classList.contains('active')) {
        clickedBtn.classList.remove('active');
        currentDiscount = 0;
        currentTerm = 1;
    } else {
        document.querySelectorAll('.term-btn').forEach(btn => btn.classList.remove('active'));
        clickedBtn.classList.add('active');
        currentDiscount = discountValue;
        currentTerm = termValue;
    }
    updateText();
}

function syncData() {
    const sel = document.getElementById('product-select').selectedOptions[0];
    if (!sel || sel.value === "Loading Systems...") return;
    document.getElementById('harmony-options').style.display = sel.text.toLowerCase().includes('harmony') ? 'block' : 'none';
    document.getElementById('product-img').src = sel.getAttribute('data-img') || "https://via.placeholder.com/400x260?text=Alma+System";
    const rate = parseFloat(sel.getAttribute('data-rate'));
    document.getElementById('rate-display').innerText = "Annual Rate: " + (rate === 0 ? "0%" : (rate * 100).toFixed(1) + "%");
    updateText();
}

function getFullPrice() {
    const sel = document.getElementById('product-select').selectedOptions[0];
    if (!sel || sel.text.includes("Loading")) return 0;
    const base = parseFloat(sel.value) || 0;
    const lPrice = parseFloat(sel.getAttribute('data-laser-p')) || 0;
    const iPrice = parseFloat(sel.getAttribute('data-ipl-p')) || 0;
    const lQty = parseInt(document.getElementById('laser-count').value) || 0;
    const iQty = parseInt(document.getElementById('ipl-count').value) || 0;
    
    const rawTotal = base + (lQty * lPrice) + (iQty * iPrice);
    return rawTotal * (1 - currentDiscount);
}

function updateText() {
    const subtotal = getFullPrice();
    document.getElementById('subtotal-display').innerText = "$" + Math.round(subtotal).toLocaleString();
    const tradeIn = parseFloat(document.getElementById('trade-val').value) || 0;
    const adjustedTotal = subtotal - tradeIn;
    const pct = document.getElementById('dep-slider').value;
    document.getElementById('dep-perc-label').innerText = pct + "% Deposit";
    document.getElementById('dep-num').value = Math.round(adjustedTotal * (pct / 100));
    calculateWeekly();
}

function updateSlider() {
    const subtotal = getFullPrice();
    const tradeIn = parseFloat(document.getElementById('trade-val').value) || 0;
    const adjustedTotal = subtotal - tradeIn;
    const amt = parseFloat(document.getElementById('dep-num').value) || 0;
    let pct = adjustedTotal > 0 ? Math.round((amt / adjustedTotal) * 100) : 15;
    document.getElementById('dep-slider').value = Math.min(Math.max(pct, 15), 100);
    updateText();
}

function toggleSubtotal() {
    const s = document.getElementById('subtotal-section');
    const btn = document.getElementById('subtotal-btn');
    const isHidden = s.style.display === 'none' || s.style.display === '';
    s.style.display = isHidden ? 'block' : 'none';
    btn.innerText = isHidden ? '- Hide Subtotal' : '+ Show Price Subtotal';
}

function toggleTradeIn() {
    const s = document.getElementById('trade-in-section');
    const btn = document.getElementById('trade-in-btn');
    const isHidden = s.style.display === 'none' || s.style.display === '';
    s.style.display = isHidden ? 'block' : 'none';
    btn.innerText = isHidden ? '- Remove Trade-In' : '+ Add Trade-In Value';
    if (!isHidden) { document.getElementById('trade-val').value = ''; updateText(); }
}

function calculateWeekly() {
    const sel = document.getElementById('product-select').selectedOptions[0];
    if (!sel || sel.text.includes("Loading")) return;
    const subtotal = getFullPrice();
    const tradeIn = parseFloat(document.getElementById('trade-val').value) || 0;
    const loan = (subtotal - tradeIn) - (parseFloat(document.getElementById('dep-num').value) || 0);
    const annualRate = parseFloat(sel.getAttribute('data-rate'));
    const totalWeeks = currentTerm * 52;
    
    if (loan <= 0) { document.getElementById('weekly-result').innerText = "$0"; return; }
    let pmt = (annualRate === 0) ? (loan / totalWeeks) : ((loan * (annualRate/52)) / (1 - Math.pow(1 + (annualRate/52), -totalWeeks)));
    document.getElementById('weekly-result').innerText = "$" + Math.round(pmt).toLocaleString();
}

window.onload = loadPrices;
</script>
</body>
</html>
